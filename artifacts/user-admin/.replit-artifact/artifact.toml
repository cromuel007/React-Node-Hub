kind = "web"
previewPath = "/"
title = "User Admin"
version = "1.0.0"
id = "artifacts/user-admin"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21756

[services.development]
run = "pnpm --filter @workspace/user-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/user-admin", "run", "build" ]
serve = "static"
publicDir = "artifacts/user-admin/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21756"
BASE_PATH = "/"
